<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            height: 100vh;
        }
        #content {
            background: white;
            margin: auto;
            width: 400px;
            height: 90%;

            border: 10px solid darkblue;
            border-radius: 10%;

            overflow: hidden;
        }
        #formContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            
            
        }
        #header {
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            height: 30%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: white;
            text-shadow: 2px 2px black;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr;
            width: 90%;
            font-size: 1em;
            gap: 20px;
            
        }

        #closeBtn {
            position: absolute;
            top: 15px;
            left: 485px;
        }
        /* input {
            align-self: right;
        } */
        h3 {
            margin: 20px;
        }
        #username {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        #password {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        #email {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        #gender {
            display: grid;
            grid-template-columns: 40% repeat(4, 1fr);
        }
        #male, #female {
            justify-self: right;
            margin-right: 10px;
        }
        #newsletter {
            justify-self: center;
        }
        #conditions {
            justify-self: center;
        }
        #submit {
            justify-self: center;
        }
        #bookImages {
            display: flex;
            gap: 1px;
            margin: 20px
        }
        .bookImage {
            width: 75px;
            height: auto;
        }
    </style>




</head>

<body>
    <div id="content">
        <button type="button" id="closeBtn">X</button>
        <div id="header">
                <h2>Daily Feed</h2>
                <h3>Scripture a day</h3>
        </div> 
        <div id="formContainer">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">

                <div id="username">
                    <label for="username">User Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div id="password">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div id="email">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div id="gender">
                    <label>Gender:</label>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section id="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section id="conditions">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section id="submit">
                    <button type="submit">Submit</button>
                </section>
            </form>
            <div id="bookImages"> 
                <img src="images/book_of_mormon.webp" class="bookImage">
                <img src="images/doctrine_and_covenants.webp" class="bookImage">
                <img src="images/new_testament.webp" class="bookImage">
                <img src="images/old_testament.webp" class="bookImage">
                <img src="images/pearl_of_great_price.webp" class="bookImage">
            </div>

        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>
    </div>
</body>

</html>
