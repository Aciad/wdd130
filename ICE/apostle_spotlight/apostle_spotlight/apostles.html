<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        div.content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            align-content: center;

            width: 75%;

            background-image: url("images/christus.webp");
            background-position: 75%;
            background-size: 135%;
            border: solid;
            border-radius: 50px;
            border-width: 5px;
            
        }
        div.presidency {

            align-self: center;

            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            
            max-width: 50%;

        }
        div.first-presidency {
            
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        div.quorum-o-12 {
            
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            column-gap: 5px;
            row-gap: 20px;
            
            
        }
        img.apostle {
            width: 20%;
            aspect-ratio: 1/1;
            object-fit: cover;
            object-position: 50% 25%;
            

            border: solid;
            border-color: white;
            border-width: 5px;
            border-radius: 50%;
        }
        img.first-presidency {
            width: 35%;
            aspect-ratio: 1/1;
            object-fit: cover;
            object-position: 50% 25%;

            border: solid;
            border-color: white;
            border-width: 5px;
            border-radius: 50%;
        }
        img.prophet {
            width: 40%;
            aspect-ratio: 1/1;
            object-fit: cover;
            object-position: 50% 25%;

            border: solid;
            border-color: white;
            border-width: 5px;
            border-radius: 50%;
        }
        h1, h2 {
            color: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
        }
        
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <div class="content">
        <div class="presidency">
            <h1>First Presidency</h1>
            <div class="first-presidency">
                <img class="first-presidency" src="images/eyring.webp">
                <img class="prophet" src="images/oaks.webp">
                <img class="first-presidency" src="images/christofferson.webp">
            </div>
            <h2>Quorum of the Twelve Apostles</h2>
            <div class="quorum-o-12">
                <img class="apostle" src="images/uchtdorf.webp">
                <img class="apostle" src="images/bednar.webp">
                <img class="apostle" src="images/cook.webp">
                <img class="apostle" src="images/anderson.webp">
                <img class="apostle" src="images/rasband.webp">
                <img class="apostle" src="images/stevenson.webp">
                <img class="apostle" src="images/renlund.webp">
                <img class="apostle" src="images/gong.webp">
                <img class="apostle" src="images/soares.webp">
                <img class="apostle" src="images/kearon.webp">
                <img class="apostle" src="images/causse.webp">
                <img class="apostle" src="images/gilbert.webp">
            </div>
        </div>
    </div>
</body>
</html>
